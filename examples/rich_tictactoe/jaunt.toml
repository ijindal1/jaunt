version = 1

[paths]
source_roots = ["src"]
test_roots = ["tests"]
generated_dir = "__generated__"

[llm]
provider = "openai"
model = "gpt-5.4"
api_key_env = "OPENAI_API_KEY"
reasoning_effort = "high"

[test]
pytest_args = ["-q"]

[build]
ty_retry_attempts = 2

[agent]
engine = "aider"

[aider]
build_mode = "architect"
test_mode = "code"
skill_mode = "code"
editor_model = "gpt-5.4"
